version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
      time: '07:00'
      timezone: Europe/Saratov
    open-pull-requests-limit: 5
    groups:
      next:
        patterns:
          - next
          - eslint-config-next
      react:
        patterns:
          - react
          - react-dom
          - '@types/react'
          - '@types/react-dom'
      tooling:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
      time: '07:30'
      timezone: Europe/Saratov
    open-pull-requests-limit: 5
