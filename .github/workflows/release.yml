name: Release to Vercel

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: production-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: prj_86TL7O8C18wnyLgBObplfVgvxvRU

    steps:
      - name: Checkout release
        uses: actions/checkout@v6

      - name: Deploy with Vercel production environment
        run: npx vercel@53.3.1 deploy --yes --prod --token=${{ secrets.VERCEL_TOKEN }}
